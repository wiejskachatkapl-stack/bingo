<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#070018" />
  <title>BINGO v1001</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="app" class="app" aria-label="BINGO v1001">
    <section id="screenStart" class="screen screen-start is-active" aria-label="Ekran startowy BINGO">
      <div class="stage stage-start">
        <button id="btnPlay" class="hit-btn hit-play" type="button" aria-label="Graj">GRAJ</button>
        <button id="btnExitStart" class="hit-btn hit-exit-start" type="button" aria-label="Wyjście">WYJŚCIE</button>
      </div>
    </section>

    <section id="screenGame" class="screen screen-game" aria-label="Ekran gry BINGO">
      <div class="stage stage-game">
        <div class="left-info" aria-label="Dane pokoju">
          <div class="info-box nick-box">
            <span>NICK</span>
            <strong id="playerNick">Mariusz</strong>
          </div>
          <div class="info-box room-box">
            <span>KOD POKOJU</span>
            <strong id="roomCode">PWG5N2D</strong>
          </div>
        </div>

        <aside id="playersPanel" class="players-panel" aria-label="Gracze w pokoju">
          <div class="player-row" data-player="1">
            <div class="player-name">MARIUSZ</div>
            <div class="balls"><i></i><i></i><i></i><i></i><i></i></div>
          </div>
        </aside>

        <button id="btnExitGame" class="hit-btn hit-exit-game" type="button" aria-label="Wyjście">WYJŚCIE</button>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
